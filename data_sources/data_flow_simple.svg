<svg viewBox="0 0 1220 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ti de">
<title id="ti">How WaitCost gets and uses its data</title>
<desc id="de">Four steps: free public websites, code downloads the data, code crunches it, you get a plain-English answer. Runs on your computer.</desc>
<style>
  .t{font:600 20px system-ui, -apple-system, sans-serif; fill:#1c1b16}
  .sub{font:400 13px system-ui, sans-serif; fill:#56534b}
  .bt{font:600 15px system-ui, sans-serif; fill:#1c1b16}
  .bs{font:400 11.5px system-ui, sans-serif; fill:#56534b}
  .vb{font:700 9px system-ui, sans-serif; fill:#56534b; letter-spacing:.08em}
  .num{font:700 13px system-ui, sans-serif; fill:#fff}
  .bx{fill:#ffffff; stroke:#d9d5c9; stroke-width:1.3}
  .pill{fill:#ffffff; stroke:#b8b3a6; stroke-width:1}
  .ic{fill:none; stroke:#1A56DB; stroke-width:2; stroke-linecap:round; stroke-linejoin:round}
  .badge{fill:#1A56DB}
  .note{font:400 12px system-ui, sans-serif; fill:#56534b}
</style>
<defs>
  <marker id="ah" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto">
    <path d="M0,0 L7,3 L0,6 z" fill="#1A56DB"/>
  </marker>
</defs>

<rect x="0" y="0" width="1220" height="360" fill="#FAFAF7"/>
<text class="t" x="40" y="34">How WaitCost gets and uses its data</text>
<text class="sub" x="40" y="56">Four simple steps — it all runs on your computer.</text>

<g stroke="#1A56DB" stroke-width="2" fill="none">
  <path d="M280,182 L334,182" marker-end="url(#ah)"/>
  <path d="M580,182 L634,182" marker-end="url(#ah)"/>
  <path d="M880,182 L934,182" marker-end="url(#ah)"/>
</g>
<rect class="pill" x="286" y="173" width="42" height="18" rx="9"/><text class="vb" x="307" y="185" text-anchor="middle">FETCH</text>
<rect class="pill" x="582" y="173" width="56" height="18" rx="9"/><text class="vb" x="610" y="185" text-anchor="middle">PROCESS</text>
<rect class="pill" x="884" y="173" width="40" height="18" rx="9"/><text class="vb" x="904" y="185" text-anchor="middle">SHOW</text>

<rect class="bx" x="40" y="78" width="240" height="212" rx="12"/>
<circle class="badge" cx="64" cy="102" r="14"/><text class="num" x="64" y="107" text-anchor="middle">1</text>
<g transform="translate(160,150)">
  <circle class="ic" cx="0" cy="0" r="22"/>
  <ellipse class="ic" cx="0" cy="0" rx="9" ry="22"/>
  <path class="ic" d="M-22,0 L22,0 M-19,-11 L19,-11 M-19,11 L19,11"/>
</g>
<text class="bt" x="160" y="212" text-anchor="middle">Public websites</text>
<text class="bs" x="160" y="234" text-anchor="middle">Free government data:</text>
<text class="bs" x="160" y="251" text-anchor="middle">homeless counts, income, plans</text>

<rect class="bx" x="340" y="78" width="240" height="212" rx="12"/>
<circle class="badge" cx="364" cy="102" r="14"/><text class="num" x="364" y="107" text-anchor="middle">2</text>
<g transform="translate(460,150)">
  <path class="ic" d="M0,-24 L0,6"/>
  <path class="ic" d="M-11,-6 L0,6 L11,-6"/>
  <path class="ic" d="M-20,12 L-20,20 L20,20 L20,12"/>
</g>
<text class="bt" x="460" y="212" text-anchor="middle">Code fetches it</text>
<text class="bs" x="460" y="234" text-anchor="middle">A small program downloads</text>
<text class="bs" x="460" y="251" text-anchor="middle">the numbers and saves them</text>

<rect class="bx" x="640" y="78" width="240" height="212" rx="12"/>
<circle class="badge" cx="664" cy="102" r="14"/><text class="num" x="664" y="107" text-anchor="middle">3</text>
<g transform="translate(760,150)">
  <circle class="ic" cx="0" cy="0" r="9"/>
  <path class="ic" d="M0,-20 L0,-13 M0,13 L0,20 M-20,0 L-13,0 M13,0 L20,0 M-14,-14 L-9,-9 M9,9 L14,14 M14,-14 L9,-9 M-9,9 L-14,14"/>
</g>
<text class="bt" x="760" y="212" text-anchor="middle">Code crunches it</text>
<text class="bs" x="760" y="234" text-anchor="middle">Finds patterns, runs the</text>
<text class="bs" x="760" y="251" text-anchor="middle">what-if cost simulation</text>

<rect class="bx" x="940" y="78" width="240" height="212" rx="12"/>
<circle class="badge" cx="964" cy="102" r="14"/><text class="num" x="964" y="107" text-anchor="middle">4</text>
<g transform="translate(1060,150)">
  <path class="ic" d="M-24,-16 L24,-16 L24,10 L-6,10 L-16,20 L-16,10 L-24,10 Z"/>
  <path class="ic" d="M-12,-2 L-12,2 M-2,-5 L-2,2 M8,-8 L8,2"/>
</g>
<text class="bt" x="1060" y="212" text-anchor="middle">You get an answer</text>
<text class="bs" x="1060" y="234" text-anchor="middle">Plain-English + charts:</text>
<text class="bs" x="1060" y="251" text-anchor="middle">what waiting would cost</text>

<text class="note" x="40" y="328">In plain terms: collect free public data → the code does the math → you see a clear, sourced answer.</text>
</svg>
