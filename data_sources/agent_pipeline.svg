<svg viewBox="0 0 960 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ti de">
<title id="ti">How WaitCost answers a question — the AI pipeline</title>
<desc id="de">Your question goes to Claude Sonnet 4.6 (the brain), which understands and plans with confidence-gated routing and adaptive thinking, falling back offline to a deterministic rule planner if no API key. Claude calls engine tools in an agentic loop; the Python sandbox (simulator, ML inflow model, US-data retrieval, metrics) computes every number. Claude writes the number-guarded brief; the Evaluator agent checks it (grounding, scope, parameters, data confidence, chart=text, answers-you) and returns pass / warn / repair / decline; the answer ships with a Response Check; recommending spend is Tier-2 and pauses for a human.</desc>
<style>
  .t{font:600 23px system-ui,-apple-system,sans-serif; fill:#1c1b16}
  .sub{font:400 12.5px system-ui,sans-serif; fill:#56534b}
  .bt{font:700 15px system-ui,sans-serif; fill:#1c1b16}
  .bs{font:400 12px system-ui,sans-serif; fill:#56534b}
  .gt{font:700 14px system-ui,sans-serif; fill:#1a7f50}
  .gs{font:400 11px system-ui,sans-serif; fill:#3a7a5f}
  .pt{font:700 15.5px system-ui,sans-serif; fill:#4338CA}
  .ps{font:400 11.5px system-ui,sans-serif; fill:#5B4FC4}
  .chip{font:600 10px system-ui,sans-serif; fill:#5B4FC4}
  .et{font:700 15px system-ui,sans-serif; fill:#1A3FA0}
  .es{font:400 11.5px system-ui,sans-serif; fill:#34507f}
  .amb{font:700 13px system-ui,sans-serif; fill:#9A5B16}
  .lab{font:700 10.5px system-ui,sans-serif; fill:#56534b}
  .leg{font:400 11.5px system-ui,sans-serif; fill:#56534b}
  .rep{font:700 10px system-ui,sans-serif; fill:#C2772A}
</style>
<defs>
  <marker id="ar" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 z" fill="#9b968a"/></marker>
  <marker id="arA" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 z" fill="#C2772A"/></marker>
</defs>

<rect x="0" y="0" width="960" height="920" fill="#FAFAF7"/>
<text class="t" x="34" y="40">How WaitCost answers a question</text>
<text class="sub" x="34" y="64">Claude Sonnet 4.6 reasons and plans · the engine owns every number · an evaluator checks the answer · a human owns every dollar.</text>

<!-- Q -->
<rect x="368" y="94" width="204" height="52" rx="9" style="fill:#F0EDE6;stroke:#C9C3B5;stroke-width:1.3"/>
<text class="bt" x="470" y="119" text-anchor="middle">Your question</text>
<text class="bs" x="470" y="137" text-anchor="middle">any of 16 question types</text>
<path d="M470,146 L470,162" stroke="#9b968a" stroke-width="2" fill="none" marker-end="url(#ar)"/>

<!-- Brain: Claude -->
<rect x="272" y="164" width="396" height="92" rx="10" style="fill:#ECE9FB;stroke:#7C6FD6;stroke-width:1.6"/>
<text class="pt" x="470" y="190" text-anchor="middle">Claude Sonnet 4.6 · the brain</text>
<text class="ps" x="470" y="209" text-anchor="middle" style="font-size:10.5px">understand · plan · confidence-gated routing · adaptive thinking</text>
<rect x="300" y="222" width="340" height="20" rx="10" style="fill:#F3F1FB;stroke:#B9B0E0;stroke-width:0.9"/>
<text class="chip" x="470" y="236" text-anchor="middle">offline fallback: rule planner (deterministic, no key)</text>
<path d="M470,256 L470,288" stroke="#9b968a" stroke-width="2" fill="none" marker-end="url(#ar)"/>

<!-- Sandbox / tool loop -->
<rect x="60" y="292" width="820" height="126" rx="11" style="fill:#ffffff;stroke:#D9D5C9;stroke-width:1.3"/>
<text class="lab" x="76" y="314">AGENTIC TOOL LOOP · PYTHON SANDBOX — Claude calls tools; the engine computes every number</text>
<rect x="76"  y="330" width="182" height="72" rx="9" style="fill:#E7F3EC;stroke:#2E8B6F;stroke-width:1.3"/>
<text class="gt" x="167" y="362" text-anchor="middle">Simulator</text><text class="gs" x="167" y="381" text-anchor="middle">flows + Monte Carlo</text>
<rect x="278" y="330" width="182" height="72" rx="9" style="fill:#E7F3EC;stroke:#2E8B6F;stroke-width:1.3"/>
<text class="gt" x="369" y="362" text-anchor="middle">ML inflow model</text><text class="gs" x="369" y="381" text-anchor="middle">ACS → PIT, SHAP</text>
<rect x="480" y="330" width="182" height="72" rx="9" style="fill:#E7F3EC;stroke:#2E8B6F;stroke-width:1.3"/>
<text class="gt" x="571" y="362" text-anchor="middle">Retrieve US data</text><text class="gs" x="571" y="381" text-anchor="middle">real public indicators</text>
<rect x="682" y="330" width="182" height="72" rx="9" style="fill:#E7F3EC;stroke:#2E8B6F;stroke-width:1.3"/>
<text class="gt" x="773" y="362" text-anchor="middle">Compare &amp; metrics</text><text class="gs" x="773" y="381" text-anchor="middle">budgets, mix, break-even</text>
<path d="M470,418 L470,450" stroke="#9b968a" stroke-width="2" fill="none" marker-end="url(#ar)"/>

<!-- Voice -->
<rect x="290" y="452" width="360" height="66" rx="10" style="fill:#ECE9FB;stroke:#7C6FD6;stroke-width:1.6"/>
<text class="pt" x="470" y="480" text-anchor="middle">Claude · the voice</text>
<text class="ps" x="470" y="500" text-anchor="middle">writes the decision brief — number-guarded</text>
<path d="M470,518 L470,554" stroke="#9b968a" stroke-width="2" fill="none" marker-end="url(#ar)"/>

<!-- Evaluator (5th agent) -->
<rect x="226" y="556" width="488" height="100" rx="10" style="fill:#EEF2FB;stroke:#1A56DB;stroke-width:1.7"/>
<text class="et" x="470" y="584" text-anchor="middle">Evaluator agent — checks the answer before you see it</text>
<text class="es" x="470" y="608" text-anchor="middle" style="font-size:10.5px">grounded · in scope · parameters · data confidence · chart = text · answers you</text>
<g style="font:700 13px system-ui,sans-serif">
  <text x="318" y="634" fill="#56534b">verdict:</text>
  <text x="390" y="634" fill="#1a7f50">pass</text>
  <text x="428" y="634" fill="#9b968a">·</text>
  <text x="442" y="634" fill="#B45309">warn</text>
  <text x="484" y="634" fill="#9b968a">·</text>
  <text x="498" y="634" fill="#1A56DB">repair</text>
  <text x="548" y="634" fill="#9b968a">·</text>
  <text x="562" y="634" fill="#B42318">decline</text>
</g>
<path d="M470,656 L470,690" stroke="#9b968a" stroke-width="2" fill="none" marker-end="url(#ar)"/>

<!-- repair loop arrow -->
<path d="M714,604 L905,604 L905,200 L670,200" stroke="#C2772A" stroke-width="1.6" fill="none" stroke-dasharray="5 4" marker-end="url(#arA)"/>
<text class="rep" x="922" y="408" text-anchor="middle" transform="rotate(-90 922 408)">repair · re-route (1×)</text>

<!-- Answer -->
<rect x="262" y="692" width="416" height="64" rx="10" style="fill:#F0EDE6;stroke:#C9C3B5;stroke-width:1.3"/>
<text class="bt" x="470" y="718" text-anchor="middle">Answer + Response Check</text>
<text class="bs" x="470" y="738" text-anchor="middle" style="font-size:10.5px">every number from code · what went wrong is shown, not hidden</text>
<path d="M470,756 L470,784" stroke="#9b968a" stroke-width="2" fill="none" marker-end="url(#ar)"/>

<!-- Tier 2 -->
<rect x="280" y="786" width="380" height="40" rx="9" style="fill:#FBEEDD;stroke:#C2772A;stroke-width:1.4"/>
<text class="amb" x="470" y="811" text-anchor="middle">Tier-2 (recommend spend) pauses for a human</text>

<!-- legend -->
<rect x="48" y="866" width="14" height="14" rx="3" style="fill:#ECE9FB;stroke:#7C6FD6;stroke-width:1.2"/><text class="leg" x="70" y="877">Claude Sonnet 4.6</text>
<rect x="210" y="866" width="14" height="14" rx="3" style="fill:#F3F1FB;stroke:#B9B0E0;stroke-width:1.2"/><text class="leg" x="232" y="877">offline fallback</text>
<rect x="360" y="866" width="14" height="14" rx="3" style="fill:#E7F3EC;stroke:#2E8B6F;stroke-width:1.2"/><text class="leg" x="382" y="877">engine (sandbox)</text>
<rect x="525" y="866" width="14" height="14" rx="3" style="fill:#EEF2FB;stroke:#1A56DB;stroke-width:1.2"/><text class="leg" x="547" y="877">Evaluator</text>
<rect x="645" y="866" width="14" height="14" rx="3" style="fill:#F0EDE6;stroke:#C9C3B5;stroke-width:1.2"/><text class="leg" x="667" y="877">in / out</text>
</svg>
