<svg viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ti de">
<title id="ti">The Response Check panel — what the user sees</title>
<desc id="de">Three states of the evaluator's response-check panel shown under every answer: pass (high confidence), warn (answer shown with caveats), and decline (refuses with the reason and a suggested reformulation).</desc>
<style>
  .t{font:600 22px system-ui,-apple-system,sans-serif; fill:#1c1b16}
  .sub{font:400 13px system-ui,sans-serif; fill:#56534b}
  .hd{font:700 14px system-ui,sans-serif; fill:#1c1b16}
  .row{font:400 12.5px system-ui,sans-serif; fill:#1c1b16}
  .b{font:700 12.5px system-ui,sans-serif; fill:#1c1b16}
  .pill{font:700 9.5px system-ui,sans-serif; letter-spacing:.05em}
  .btn{font:600 11px system-ui,sans-serif; fill:#1A56DB}
  .cap{font:400 12px system-ui,sans-serif; fill:#56534b}
</style>

<rect x="0" y="0" width="900" height="660" fill="#FAFAF7"/>
<text class="t" x="36" y="40">What the user sees — the “Response Check” under every answer</text>
<text class="sub" x="36" y="62">The agent surfaces what went wrong instead of hiding it. Three states: pass · warn · decline.</text>

<!-- ============ CARD A — PASS ============ -->
<rect x="36" y="86" width="828" height="150" rx="11" style="fill:#ffffff;stroke:#D9D5C9;stroke-width:1.3"/>
<rect x="36" y="86" width="7" height="150" rx="3.5" style="fill:#1a7f50"/>
<text class="hd" x="60" y="116">Response check</text>
<rect x="744" y="102" width="104" height="20" rx="10" style="fill:#E7F3EC;stroke:#1a7f50;stroke-width:0.8"/>
<text class="pill" x="796" y="116" text-anchor="middle" fill="#1a7f50">HIGH CONFIDENCE</text>
<!-- rows -->
<circle cx="72" cy="150" r="8" style="fill:#1a7f50"/><path d="M68.5,150 L71,152.5 L75.5,147" stroke="#fff" stroke-width="1.7" fill="none"/>
<text class="row" x="92" y="154"><tspan class="b">Grounded</tspan> — every figure traces to the simulator (0 invented)</text>
<circle cx="72" cy="176" r="8" style="fill:#1a7f50"/><path d="M68.5,176 L71,178.5 L75.5,173" stroke="#fff" stroke-width="1.7" fill="none"/>
<text class="row" x="92" y="180"><tspan class="b">In scope</tspan> — city-level only; no individual data used</text>
<circle cx="72" cy="202" r="8" style="fill:#1a7f50"/><path d="M68.5,202 L71,204.5 L75.5,199" stroke="#fff" stroke-width="1.7" fill="none"/>
<text class="row" x="92" y="206"><tspan class="b">Answers your question</tspan> — “cost of waiting · 3 years · $15M · Los Angeles”</text>
<circle cx="72" cy="222" r="8" style="fill:#1a7f50"/><path d="M68.5,222 L71,224.5 L75.5,219" stroke="#fff" stroke-width="1.7" fill="none"/>
<text class="row" x="92" y="226"><tspan class="b">Data confidence</tspan> — high (Los Angeles: calibrated &amp; backtested)</text>

<!-- ============ CARD B — WARN ============ -->
<rect x="36" y="256" width="828" height="170" rx="11" style="fill:#ffffff;stroke:#D9D5C9;stroke-width:1.3"/>
<rect x="36" y="256" width="7" height="170" rx="3.5" style="fill:#B45309"/>
<text class="hd" x="60" y="286">Response check</text>
<rect x="752" y="272" width="96" height="20" rx="10" style="fill:#FBEEDD;stroke:#B45309;stroke-width:0.8"/>
<text class="pill" x="800" y="286" text-anchor="middle" fill="#9A5B16">USE WITH CARE</text>
<circle cx="72" cy="320" r="8" style="fill:#1a7f50"/><path d="M68.5,320 L71,322.5 L75.5,317" stroke="#fff" stroke-width="1.7" fill="none"/>
<text class="row" x="92" y="324"><tspan class="b">Grounded</tspan> — figures trace to the simulator</text>
<circle cx="72" cy="346" r="8" style="fill:#B45309"/><line x1="72" y1="342.5" x2="72" y2="347.5" stroke="#fff" stroke-width="1.8"/><circle cx="72" cy="350.5" r="1" fill="#fff"/>
<text class="row" x="92" y="350"><tspan class="b">Assumption</tspan> — you didn’t name a budget; assumed $10M (LA default)</text>
<rect x="690" y="339" width="64" height="19" rx="9.5" style="fill:#EEF2FB;stroke:#1A56DB;stroke-width:0.8"/><text class="btn" x="722" y="352" text-anchor="middle">Change</text>
<circle cx="72" cy="372" r="8" style="fill:#B45309"/><line x1="72" y1="368.5" x2="72" y2="373.5" stroke="#fff" stroke-width="1.8"/><circle cx="72" cy="376.5" r="1" fill="#fff"/>
<text class="row" x="92" y="376"><tspan class="b">Data confidence</tspan> — Chicago is illustrative, not calibrated like LA; treat the range as wide</text>
<circle cx="72" cy="398" r="8" style="fill:#1a7f50"/><path d="M68.5,398 L71,400.5 L75.5,395" stroke="#fff" stroke-width="1.7" fill="none"/>
<text class="row" x="92" y="402"><tspan class="b">Question match</tspan> — re-checked after an automatic re-route</text>

<!-- ============ CARD C — DECLINE ============ -->
<rect x="36" y="446" width="828" height="170" rx="11" style="fill:#ffffff;stroke:#D9D5C9;stroke-width:1.3"/>
<rect x="36" y="446" width="7" height="170" rx="3.5" style="fill:#B42318"/>
<text class="hd" x="60" y="478" fill="#B42318">I can’t answer this confidently — here’s why</text>
<circle cx="72" cy="512" r="8" style="fill:#B42318"/><path d="M69,509 L75,515 M75,509 L69,515" stroke="#fff" stroke-width="1.6"/>
<text class="row" x="92" y="508"><tspan class="b">Out of scope</tspan> — this looks like it’s about a specific person or address.</text>
<text class="row" x="92" y="528">I only work at the whole-city level — a deliberate privacy limit, not a bug.</text>
<text class="row" x="60" y="566"><tspan class="b">Try instead</tspan></text>
<rect x="146" y="552" width="430" height="24" rx="12" style="fill:#EEF2FB;stroke:#1A56DB;stroke-width:1"/>
<text class="btn" x="166" y="568">“What’s the cost of waiting in Los Angeles?”</text>
<text class="cap" x="60" y="598" fill="#56534b">No wrong answer is shown — the user gets the reason and a path forward.</text>

<text class="cap" x="36" y="642">Shown under every answer, produced by the Evaluator agent — the design choice is to make errors loud, not silent.</text>
</svg>
