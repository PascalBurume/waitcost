# WaitCost — full public stack: Gemma (Ollama) + FastAPI backend + React frontend.
# One public port (80) via nginx; backend and Ollama stay on the internal network.
#
#   docker compose up -d --build
#   # first boot pulls the Gemma model (a few GB) — watch: docker compose logs -f ollama-pull
#
# Then open http://<server-ip>/  (or your domain). See .env.example for tuning.

services:
  # On-device LLM. Gemma 3n e2b runs on CPU (~4-6 GB RAM); no GPU required.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  # One-shot: pull the Gemma model into the shared volume, then exit.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull ${GEMMA_MODEL:-gemma3n:e2b}"]
    restart: "no"

  # FastAPI engine. Talks to Ollama over the internal network.
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - WAITCOST_PLANNER=${WAITCOST_PLANNER:-gemma}
      - OLLAMA_HOST=http://ollama:11434
      - GEMMA_MODEL=${GEMMA_MODEL:-gemma3n:e2b}
      - GEMMA_TIMEOUT=${GEMMA_TIMEOUT:-60}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # nginx: serves the built React app and reverse-proxies /api/* to the backend.
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama:
